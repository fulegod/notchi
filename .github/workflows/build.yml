name: Build PokéNotch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Resolve packages
        run: |
          cd notchi
          xcodebuild -resolvePackageDependencies -project notchi.xcodeproj -scheme notchi

      - name: Build archive
        run: |
          cd notchi
          xcodebuild archive \
            -project notchi.xcodeproj \
            -scheme notchi \
            -configuration Release \
            -archivePath build/PokenNotch.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO \
            2>&1 | tail -30

      - name: Export and package
        run: |
          ARCHIVE="notchi/build/PokenNotch.xcarchive"
          APP="$ARCHIVE/Products/Applications/notchi.app"

          if [ ! -d "$APP" ]; then
            echo "App not in archive Products. Searching..."
            find "$ARCHIVE" -name "notchi.app" -type d 2>/dev/null
            find "$ARCHIVE" -name "notchi" -type f 2>/dev/null | head -10
            # Try direct from build
            find notchi/build -name "notchi" -type f -perm +111 2>/dev/null | head -10
            APP=$(find "$ARCHIVE" -name "notchi.app" -type d | head -1)
          fi

          echo "App: $APP"
          ls -la "$APP/Contents/MacOS/" 2>/dev/null || echo "No MacOS dir"
          find "$APP" -type f | head -20

          # Ad-hoc sign
          codesign --force --deep --sign - "$APP" 2>/dev/null || true

          ditto -c -k --keepParent "$APP" PokenNotch.zip
          ls -lh PokenNotch.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokenNotch
          path: PokenNotch.zip
