name: Build PokéNotch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: |
          cd notchi
          xcodebuild -project notchi.xcodeproj \
            -scheme notchi \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="" \
            -verbose \
            2>&1 | tail -40

      - name: Verify and Package
        run: |
          APP_PATH=$(find notchi/build -name "notchi.app" -type d | head -1)
          echo "App at: $APP_PATH"

          # Show full contents
          find "$APP_PATH" -type f | head -30

          # Check binary
          BINARY="$APP_PATH/Contents/MacOS/notchi"
          if [ -f "$BINARY" ]; then
            echo "Binary found!"
            file "$BINARY"
          else
            echo "Binary NOT found. Checking build products..."
            find notchi/build -name "notchi" -type f 2>/dev/null
            # Maybe it's in a different location
            find notchi/build -type f -perm +111 | head -10
          fi

          # Package with ditto
          ditto -c -k --keepParent "$APP_PATH" PokenNotch.zip
          ls -lh PokenNotch.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokenNotch
          path: PokenNotch.zip
