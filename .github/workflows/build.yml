name: Build PokéNotch

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Build
        run: |
          cd notchi

          # Remove sandbox entitlement that requires proper signing
          cat > notchi/notchi.entitlements << 'ENTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict/>
          </plist>
          ENTEOF

          xcodebuild build \
            -project notchi.xcodeproj \
            -scheme notchi \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            2>&1 | tail -5

          echo "--- Build products ---"
          find build/Build/Products/Release -type f -name "notchi" 2>/dev/null
          find build/Build/Products/Release -name "*.app" -type d 2>/dev/null
          ls -laR build/Build/Products/Release/notchi.app/Contents/MacOS/ 2>/dev/null || echo "MacOS dir empty"

          # If binary still missing, check intermediates
          find build -name "notchi" -not -path "*/SourcePackages/*" -type f 2>/dev/null | head -5

      - name: Package
        run: |
          APP="notchi/build/Build/Products/Release/notchi.app"
          BINARY="$APP/Contents/MacOS/notchi"

          # If binary is in Objects dir, copy it
          if [ ! -f "$BINARY" ]; then
            OBJ_BINARY=$(find notchi/build -path "*/Objects-normal/arm64/notchi" -type f 2>/dev/null | head -1)
            if [ -n "$OBJ_BINARY" ]; then
              echo "Found binary in intermediates: $OBJ_BINARY"
              cp "$OBJ_BINARY" "$BINARY"
              chmod +x "$BINARY"
            fi
          fi

          file "$BINARY"
          codesign --force --deep --sign - "$APP" || true

          ditto -c -k --keepParent "$APP" PokenNotch.zip
          ls -lh PokenNotch.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PokenNotch
          path: PokenNotch.zip
